<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudSub | پنل کاربری</title>
    <style>
        :root {
            --bg-color: #090d16;
            --panel-bg: rgba(30, 41, 59, 0.45);
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.2);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(2, 132, 199, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .panel-container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 380px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            position: relative;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--text-main);
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 8px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .status-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .status-label {
            color: #cbd5e1;
            font-size: 14px;
        }

        .status-value {
            font-weight: 700;
            font-size: 15px;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #fbbf24;
            display: inline-block;
        }

        .pulse-active {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .config-section {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 25px;
            text-align: right;
        }

        .config-title {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .config-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .config-path {
            font-family: monospace;
            font-size: 11px;
            color: #64748b;
            direction: ltr;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
        }

        .btn-copy {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn-copy:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }

        .btn-copy:active {
            transform: translateY(1px);
        }

        .btn-action {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.25);
        }

        .btn-action:hover {
            background: linear-gradient(135deg, #0369a1 0%, #025687 100%);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <div class="logo-area">
            <h1>CloudSub</h1>
        </div>
        <div class="subtitle">سیستم هوشمند مدیریت و سنجش اتصال</div>

        <div class="status-box" id="status-container">
            <span class="status-label">وضعیت اشتراک شما:</span>
            <span class="status-value">
                <span id="status-text">در حال بررسی</span>
                <span id="status-dot" class="pulse-dot"></span>
            </span>
        </div>

        <div class="config-section">
            <div class="config-title">لینک اختصاصی سابسکریپشن:</div>
            <div class="config-action">
                <span class="config-path">dwidhepqld-ramtin1/config.txt</span>
                <button class="btn-copy" id="copy-btn" onclick="copyConfig()">کپی لینک</button>
            </div>
        </div>

        <a href="https://t.me/appmaker013" class="btn-action">تمدید زمان یا خرید حجم اضافه</a>
    </div>

    <script>
        function checkStatus() {
            const textElement = document.getElementById('status-text');
            const dotElement = document.getElementById('status-dot');
            const containerElement = document.getElementById('status-container');
            
            fetch('status.json?v=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.json();
                })
                .then(data => {
                    if (data.status === true || data.status === "true") {
                        textElement.innerText = "فعال و متصل";
                        textElement.style.color = "#10b981";
                        dotElement.style.backgroundColor = "#10b981";
                        dotElement.classList.add('pulse-active');
                        containerElement.style.borderColor = "rgba(16, 185, 129, 0.2)";
                    } else if (data.status === false || data.status === "false") {
                        textElement.innerText = "منقضی شده";
                        textElement.style.color = "#ef4444";
                        dotElement.style.backgroundColor = "#ef4444";
                        dotElement.classList.remove('pulse-active');
                        containerElement.style.borderColor = "rgba(239, 68, 68, 0.2)";
                    } else {
                        textElement.innerText = "نامشخص";
                        textElement.style.color = "#fbbf24";
                        dotElement.style.backgroundColor = "#fbbf24";
                    }
                })
                .catch(() => {
                    textElement.innerText = "خطا در بررسی";
                    textElement.style.color = "#ef4444";
                    dotElement.style.backgroundColor = "#ef4444";
                });
        }

        window.onload = checkStatus;

        function copyConfig() {
            const configText = "https://sam013ff.github.io/sub/sub/dwidhepqld-ramtin1/config.txt"; 
            const btn = document.getElementById('copy-btn');
            
            navigator.clipboard.writeText(configText).then(() => {
                btn.innerText = "کپی شد! ✓";
                btn.style.backgroundColor = "#0284c7";
                setTimeout(() => {
                    btn.innerText = "کپی لینک";
                    btn.style.backgroundColor = "#10b981";
                }, 2000);
            }).catch(() => {
                return;
            });
        }
    </script>
</body>
</html>
