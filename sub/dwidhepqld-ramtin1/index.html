<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Vazirmatn', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <script>
        // وضعیت کاربر: true = فعال | false = غیرفعال
        const is_active = true; 
        
        // کانفیگ خام برای نمایش به مشتری
        const rawConfig = "vless://b54d36d1-43c3-4b8f-a5f8-cf6504db0562@144.31.233.236:9443?security=reality&encryption=none&pbk=MbYR2O0XBSeG74gGYpFIofXsILcf5lG2gc36GyURBXQ&headerType=none&type=tcp&flow=xtls-rprx-vision&sni=apple.com&sid=0199436dd359351b#dwidhepqld-ramtin1%20letpix%20%E2%9C%85__";
    </script>

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-6 space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-bold text-emerald-400 tracking-wide">LetPix VPN</h1>
            <p class="text-xs text-slate-400">پنل مدیریت و وضعیت اشتراک اختصاصی</p>
        </div>

        <hr class="border-slate-700">

        <div class="flex items-center justify-between bg-slate-850 p-4 rounded-xl border border-slate-750">
            <span class="text-sm font-medium text-slate-300">وضعیت اتصال شما:</span>
            <div id="status-badge" class="px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5 animate-pulse">
                <span id="status-dot" class="w-2 h-2 rounded-full"></span>
                <span id="status-text">بررسی...</span>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-medium text-slate-400 block">کانفیگ مستقیم (جهت کپی دستی):</label>
            <div class="relative bg-slate-950 p-3 rounded-lg border border-slate-800 flex items-center justify-between">
                <p id="config-display" class="text-xs text-slate-400 font-mono overflow-x-auto whitespace-nowrap scrollbar-none max-w-[80%] direction-ltr text-left"></p>
                <button onclick="copyConfig()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-2.5 py-1.5 rounded-md font-medium transition-colors cursor-pointer shrink-0">کپی</button>
            </div>
        </div>

        <a href="https://t.me/appmaker013" target="_blank" class="flex items-center justify-center gap-2 w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg hover:shadow-sky-500/20 text-sm cursor-pointer">
            تمدید یا خرید کانفیگ جدید (@appmaker013)
        </a>
    </div>

    <script>
        const statusBadge = document.getElementById('status-badge');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const configDisplay = document.getElementById('config-display');

        configDisplay.innerText = rawConfig;

        if (is_active) {
            statusBadge.classList.add('bg-emerald-500/10', 'text-emerald-400', 'border', 'border-emerald-500/20');
            statusDot.classList.add('bg-emerald-400');
            statusText.innerText = 'حساب شما فعال است';
        } else {
            statusBadge.classList.add('bg-rose-500/10', 'text-rose-400', 'border', 'border-rose-500/20');
            statusDot.classList.add('bg-rose-400');
            statusText.innerText = 'حساب شما منقضی شده است';
            configDisplay.innerText = "جهت دریافت کانفیگ جدید با پشتیبانی ارتباط برقرار کنید.";
        }

        function copyConfig() {
            if(!is_active) {
                alert("اشتراک شما منقضی شده است!");
                return;
            }
            navigator.clipboard.writeText(rawConfig);
            alert("کانفیگ با موفقیت کپی شد.");
        }
    </script>
</body>
</html>
